name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: vitaltrip_test
          MYSQL_DATABASE: vitaltrip_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Run E2E migrations
        run: pnpm prisma:deploy
        env:
          DATABASE_URL: mysql://root:vitaltrip_test@127.0.0.1:3306/vitaltrip_test

      - name: E2E Test
        run: pnpm test:e2e
        env:
          DATABASE_URL: mysql://root:vitaltrip_test@127.0.0.1:3306/vitaltrip_test
          JWT_SECRET: ci-jwt-secret
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret
          JWT_REFRESH_EXPIRES_IN: 30d
          OPENAI_API_KEY: test-key
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback
          FRONTEND_URL: http://localhost:3001
          QDRANT_URL: http://localhost:6333
          GOOGLE_PLACES_API_KEY: test-places-key
          NODE_ENV: test
