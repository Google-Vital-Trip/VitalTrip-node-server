name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/VitalTrip-node-server
            git fetch origin main
            DOCS_CHANGED=$(git diff HEAD origin/main --name-only | grep -c 'knowledge-base/documents' || true)
            git pull origin main
            docker compose down --remove-orphans
            docker compose up -d --build
            sleep 30
            POINT_COUNT=$(curl -sf http://localhost:6333/collections/first_aid | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['points_count'])" 2>/dev/null || echo "0")
            if [ "$DOCS_CHANGED" -gt 0 ] || [ "$POINT_COUNT" -eq 0 ]; then
              echo "Running seed:vectors (docs_changed=$DOCS_CHANGED, points=$POINT_COUNT)"
              docker compose exec -T app pnpm seed:vectors:prod
            fi
